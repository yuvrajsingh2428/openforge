name: Nightly Maintenance

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Repository Sync
        run: npm run sync:repos
        
      - name: Recommendation Benchmarks
        run: npm run benchmark:recommendations
        
      - name: Health Analysis Benchmarks
        run: npm run benchmark:health
